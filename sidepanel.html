<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NotebookLM Quick Capture</title>
    <link rel="stylesheet" href="src/ui/ui.css" />
  </head>
  <body class="panel-shell side-shell">
    <main class="panel side-panel">
      <header class="panel-header">
        <p class="eyebrow">NotebookLM</p>
        <h1>Quick capture</h1>
        <div class="status-container">
          <p id="sideSummary" class="subtle">No notebook configured yet.</p>
          <p id="sideStatus" class="status" role="status" aria-live="polite"></p>
          <p id="sideStatusMeta" class="status-meta"></p>
        </div>
      </header>

      <section class="picker">
        <div class="field-label-row">
          <span>Google account</span>
          <button id="refreshAccounts" class="mini-link" type="button">Refresh</button>
        </div>
        <select id="accountSelect">
          <option value="">Use browser default account</option>
        </select>

        <div class="field-label-row">
          <span>Notebook</span>
          <button id="refreshNotebooks" class="mini-link" type="button">Refresh</button>
        </div>
        <select id="notebookSelect">
          <option value="">Choose a notebook</option>
        </select>
        <div class="actions actions-compact">
          <button id="clipUrlFirst" class="button button-primary" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            Save page URL
          </button>
          <button id="clipTextFirst" class="button button-primary" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
            Save page text
          </button>
        </div>
        <div class="field-group">
          <div class="field-label-row">
            <span>Manual text</span>
          </div>
          <input id="manualTitle" type="text" placeholder="Optional title" />
          <textarea id="manualContent" rows="7" placeholder="Paste or type the content you want to save to NotebookLM"></textarea>
          <button id="saveManualText" class="button button-secondary button-block" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Save typed text
          </button>
        </div>

      </section>

      <section class="history">
        <div class="history-header">
          <h2>History</h2>
          <button id="refreshHistory" class="link-button" type="button">Refresh</button>
        </div>
        <ol id="historyList" class="history-list"></ol>
      </section>
    </main>

    <script src="src/ui/sidepanel.js"></script>
  </body>
</html>
